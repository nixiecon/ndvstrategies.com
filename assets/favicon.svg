<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C1D95"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a3d"/>
      <stop offset="100%" style="stop-color:#2d1270"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)"/>

  <!-- ===== N ===== -->
  <!-- Left vertical -->
  <line x1="58" y1="145" x2="58" y2="367" stroke="url(#letterGrad)" stroke-width="20" stroke-linecap="round"/>
  <!-- Diagonal -->
  <line x1="58" y1="145" x2="148" y2="367" stroke="url(#letterGrad)" stroke-width="20" stroke-linecap="round"/>
  <!-- Right vertical -->
  <line x1="148" y1="145" x2="148" y2="367" stroke="url(#letterGrad)" stroke-width="20" stroke-linecap="round"/>

  <!-- ===== D ===== -->
  <!-- Vertical -->
  <line x1="182" y1="145" x2="182" y2="367" stroke="url(#letterGrad)" stroke-width="20" stroke-linecap="round"/>
  <!-- Curved right side -->
  <path d="M 182 145 C 310 145 310 367 182 367" fill="none" stroke="url(#letterGrad)" stroke-width="20" stroke-linecap="round"/>

  <!-- ===== V ===== -->
  <!-- Left leg -->
  <line x1="336" y1="145" x2="382" y2="340" stroke="url(#letterGrad)" stroke-width="20" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="454" y1="145" x2="382" y2="340" stroke="url(#letterGrad)" stroke-width="20" stroke-linecap="round"/>

  <!-- ===== Circuit nodes ===== -->
  <!-- N -->
  <circle cx="58" cy="145" r="11" fill="#EDE9FE" stroke="#5EEAD4" stroke-width="4"/>
  <circle cx="58" cy="367" r="11" fill="#EDE9FE" stroke="#5EEAD4" stroke-width="4"/>
  <circle cx="148" cy="145" r="11" fill="#EDE9FE" stroke="#5EEAD4" stroke-width="4"/>
  <circle cx="148" cy="367" r="11" fill="#EDE9FE" stroke="#5EEAD4" stroke-width="4"/>

  <!-- D -->
  <circle cx="182" cy="145" r="11" fill="#EDE9FE" stroke="#5EEAD4" stroke-width="4"/>
  <circle cx="182" cy="367" r="11" fill="#EDE9FE" stroke="#5EEAD4" stroke-width="4"/>
  <circle cx="310" cy="256" r="11" fill="#5EEAD4" stroke="#EDE9FE" stroke-width="4"/>

  <!-- V -->
  <circle cx="336" cy="145" r="11" fill="#EDE9FE" stroke="#5EEAD4" stroke-width="4"/>
  <circle cx="454" cy="145" r="11" fill="#EDE9FE" stroke="#5EEAD4" stroke-width="4"/>
  <circle cx="382" cy="340" r="11" fill="#5EEAD4" stroke="#EDE9FE" stroke-width="4"/>
</svg>
